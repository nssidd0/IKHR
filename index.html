<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islam Ka Haqiqi Rasta</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#e0e5ec; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>

<iframe id="appFrame" 
  src="https://script.google.com/macros/s/AKfycbyOipwmqrX5B-U6N3fLYY8we37WpG9bZ1geyGa44uGtyOZfsGTM3fhTheawqqoKb7qN/exec"
  allowfullscreen>
</iframe>

<script>
// URL se ?msg=... uthao aur iframe mein forcefully jod do
const urlParams = new URLSearchParams(window.location.search);
const msgValue = urlParams.get("msg");

if (msgValue) {
  const iframe = document.getElementById("appFrame");
  let src = iframe.src;
  
  // Agar pehle se ? hai to & use karo, warna ?
  src += (src.includes("?") ? "&" : "?") + "msg=" + encodeURIComponent(msgValue);
  iframe.src = src;
  
  console.log("Deep link added to iframe src:", src);
}
</script>

</body>
</html>
