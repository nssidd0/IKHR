<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islam Ka Haqiqi Rasta</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#e0e5ec; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>

<iframe id="appFrame" 
  src="https://script.google.com/macros/s/AKfycbyOipwmqrX5B-U6N3fLYY8we37WpG9bZ1geyGa44uGtyOZfsGTM3fhTheawqqoKb7qN/exec"
  allowfullscreen>
</iframe>

<script>
window.addEventListener("message", function(event){

  if(!event.data) return;

  let data = event.data;

  if(typeof data === "string"){
    try{
      data = JSON.parse(data);
    }catch(e){}
  }

  if(data.type === "deepLink" && data.msg){

    incomingDeepLink = data.msg.trim().toLowerCase();

    console.log("Deep link received:", incomingDeepLink);

    applyDeepLink();

  }

});
</script>

</body>
</html>
