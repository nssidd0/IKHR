<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islam Ka Haqiqi Rasta</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #e0e5ec; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>
  
  <iframe id="mainAppFrame" src="https://script.google.com/macros/s/AKfycbyOipwmqrX5B-U6N3fLYY8we37WpG9bZ1geyGa44uGtyOZfsGTM3fhTheawqqoKb7qN/exec"></iframe>

  <script>
    // NETLIFY KA DIRECT JADU (Bina URL change kiye data bhejna)
    document.getElementById("mainAppFrame").onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const msg = urlParams.get('msg');
      if (msg) {
        // Iframe load hote hi Google Script ko sidha 'Message' maaro
        this.contentWindow.postMessage(msg, '*');
      }
    };
  </script>

</body>
</html>
