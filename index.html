<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islam Ka Haqiqi Rasta</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#e0e5ec; }
    iframe { border:none; width:100%; height:100%; }
  </style>
</head>
<body>

<iframe id="appFrame" 
  src="https://script.google.com/macros/s/AKfycbyOipwmqrX5B-U6N3fLYY8we37WpG9bZ1geyGa44uGtyOZfsGTM3fhTheawqqoKb7qN/exec"
  allowfullscreen>
</iframe>

<script>
const urlParams = new URLSearchParams(window.location.search);
const msgValue = urlParams.get("msg");

if (msgValue) {
  const iframe = document.getElementById("appFrame");
  
  // Wait for iframe to load, then send message
  iframe.onload = function() {
    iframe.contentWindow.postMessage(
      JSON.stringify({ type: "deepLink", msg: msgValue }),
      "*"  // or your exact GAS domain if you want tighter security
    );
    console.log("Sent deep link via postMessage:", msgValue);
  };
}
</script>

</body>
</html>
